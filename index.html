<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure DevOps Roadmap - Miro</title>
    <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <h1>DevOps Roadmap</h1>
      <p class="description">Generate a Gantt chart from Azure DevOps work items.</p>

      <div id="configured-banner" class="configured-banner" style="display: none;">
        <span>Connected to <strong id="connected-org"></strong></span>
      </div>

      <details id="admin-section">
        <summary>Admin Setup</summary>
        <div class="config-section">
          <label for="org-input">Organization</label>
          <input type="text" id="org-input" placeholder="my-org" />

          <label for="project-input">Project</label>
          <input type="text" id="project-input" placeholder="MyProject" />

          <label for="pat-input">Personal Access Token</label>
          <input type="password" id="pat-input" placeholder="PAT with Work Items read scope" />
          <p class="field-hint">Stored in Miro board storage — shared with all board members.</p>

          <label for="type-select">Work Item Types</label>
          <select id="type-select">
            <option value="Epic">Epics</option>
            <option value="Feature">Features</option>
            <option value="Epic,Feature">Epics + Features</option>
            <option value="User Story,Product Backlog Item">Stories / PBIs</option>
          </select>

          <label for="area-input">Area Path (optional)</label>
          <input type="text" id="area-input" placeholder="MyProject\\TeamA" />

          <button id="save-config-btn" class="btn btn-secondary">Save to Board</button>
          <button id="clear-config-btn" class="btn btn-danger">Clear Config</button>
        </div>
      </details>

      <hr />

      <div class="actions-section">
        <button id="fetch-btn" class="btn btn-primary" disabled>Fetch & Generate Gantt Chart</button>
        <button id="refresh-btn" class="btn btn-refresh" style="display: none;">Refresh Chart</button>
      </div>

      <div id="status" class="status-message"></div>
      <div id="preview" class="preview-section"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
